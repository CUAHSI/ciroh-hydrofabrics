name: Deploy Subsetter to GitHub Pages

on:
  push:
    branches:
      - CAM-1227-subsetter-hydroshare-dataset
    paths:
      - 'subsetter/subset.html'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: subsetter

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
