stages:
  prepare:
    cmd: docker compose run --rm hydrofabric ./bash/prepare_reference_gpkg.sh ${vpuid} 
    params:
       - vpuid
    deps:
    - ngen-workflow/bash/prepare_reference_gpkg.sh
    - ngen-workflow/data/superconus/reference_hydrofabric.gpkg
    - ngen-workflow/data/superconus/divides/${vpuid}.parquet
    - ngen-workflow/data/superconus/flowpaths/${vpuid}.parquet
    - ngen-workflow/data/superconus/hydrolocations/${vpuid}.parquet
    - ngen-workflow/data/superconus/network/${vpuid}.parquet
    #- ngen-workflow/data/superconus/NHDSnapshot/FAC/vpuid_${vpuid}.parquet
    outs:
    - ngen-workflow/data/prepared
